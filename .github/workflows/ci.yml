name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Backend — Install & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from app.config import Settings; print('Config OK')"
          python -c "from sentence_transformers import SentenceTransformer; m = SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2'); print(f'Embedding OK: {len(m.encode(\"test\"))} dims')"

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm build

  docker-stack:
    name: Docker — Build & Health Check
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          PINECONE_ENVIRONMENT=us-east-1
          PINECONE_INDEX_NAME=ecommerce-search
          DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/ecommerce
          REDIS_URL=redis://redis:6379
          APP_ENV=ci
          LOG_LEVEL=INFO
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend healthy!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Health check — Backend
        run: curl -sf http://localhost:8000/api/v1/health | python3 -m json.tool

      - name: Health check — Frontend
        run: curl -sf http://localhost:3000/ | head -5

      - name: Health check — Frontend proxies API
        run: curl -sf http://localhost:3000/api/v1/health | python3 -m json.tool

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
