name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-stack:
    name: Docker — Build & Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          PINECONE_ENVIRONMENT=us-east-1
          PINECONE_INDEX_NAME=ecommerce-search
          DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/ecommerce
          REDIS_URL=redis://redis:6379
          APP_ENV=ci
          LOG_LEVEL=INFO
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend healthy!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Health check — Backend API
        run: curl -sf http://localhost:8000/api/v1/health | python3 -m json.tool

      - name: Health check — Frontend
        run: curl -sf http://localhost:3000/ | head -5

      - name: Health check — Frontend proxies API
        run: curl -sf http://localhost:3000/api/v1/health | python3 -m json.tool

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
